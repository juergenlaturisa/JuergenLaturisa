name: README build
on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 4 * * *"
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.ACCESS_TOKEN }}  # 👈 This forces git to use your token for the download
      - name: Get Python 3.8
        uses: actions/setup-python@v5
        with:
          python-version: '3.8'
      - name: Configure pip cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/cache/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-
      - name: Install dependencies
        run: python -m pip install -r cache/requirements.txt
      - name: Update README file
        env:
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          USER_NAME: ${{ secrets.USER_NAME }}
        run: python today.py
      - name: Commit
        env:
          PERSONAL_TOKEN: ${{ secrets.ACCESS_TOKEN }} # 👈 Sets your token into the push environment
        run: |-
          git add .
          git diff
          git config --global user.email "github-actions-bot@users.noreply.github.com"
          git config --global user.name "GitHub-Actions-Bot"
          git commit -m "Updated README" -a || echo "No changes to commit"
          
          # 👈 This rewrites the push URL to securely pass your credentials
          git remote set-url origin https://x-access-token:${PERSONAL_TOKEN}@github.com/${{ github.repository }}.git
          git push origin main
