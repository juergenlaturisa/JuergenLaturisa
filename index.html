<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juergen Law Laturisa | Portfolio</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧬</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0b0f17;
            --card-bg: #131a26;
            --border-color: #222f47;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --accent-blue: #38bdf8;
            --accent-green: #34d399;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: #0f1622;
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 2rem 1rem;
            background-image: 
                radial-gradient(600px circle at var(--mouse-x, 50%) var(--mouse-y, 50%), rgba(56, 189, 248, 0.12), transparent 40%),
                linear-gradient(135deg, rgba(56, 189, 248, 0.08) 25%, transparent 25%, transparent 50%, rgba(56, 189, 248, 0.08) 50%, rgba(56, 189, 248, 0.08) 75%, transparent 75%, transparent),
                linear-gradient(180deg, #0b0f17 0%, #111a2e 50%, #0b0f17 100%);
            background-size: 100% 100%, 160px 160px, 100% 100%;
            background-attachment: fixed;
            animation: backgroundCycle 25s linear infinite;
        }

        @keyframes backgroundCycle {
            0% { background-position: center, 0px 0px, center; }
            100% { background-position: center, 160px 160px, center; }
        }

        .container {
            width: 100%;
            max-width: 540px;
            background: rgba(19, 26, 38, 0.95);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 2.5rem 2rem;
            backdrop-filter: blur(8px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .profile { text-align: center; margin-bottom: 1.5rem; }
        .avatar-container { position: relative; width: 150px; height: 150px; margin: 0 auto 1.5rem; }
        .avatar { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 2px solid var(--border-color); background: #1e293b; }
        .name { font-size: 1.5rem; font-weight: 600; margin-bottom: 0.5rem; }
        .tagline { font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; color: var(--accent-blue); margin-bottom: 0.75rem; text-transform: uppercase; }
        .bio { font-size: 0.92rem; color: var(--text-secondary); line-height: 1.5; }

        .links-container { display: flex; flex-direction: column; gap: 1rem; }
        .section-label { font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; color: var(--text-secondary); text-transform: uppercase; margin: 0.5rem 0 0.25rem; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .section-label::before, .section-label::after { content: ''; width: 30px; height: 1px; background: var(--border-color); }

        .accordion-wrapper { display: flex; flex-direction: column; gap: 0.5rem; }
        .accordion-trigger { display: flex; align-items: center; justify-content: space-between; padding: 1rem 1.25rem; background: rgba(30, 41, 59, 0.4); border: 1px solid var(--border-color); border-radius: 8px; cursor: pointer; }
        .accordion-checkbox { display: none; }
        .accordion-content { max-height: 0; overflow: hidden; display: flex; flex-direction: column; gap: 0.5rem; transition: max-height 0.3s ease; }
        .accordion-checkbox:checked ~ .accordion-content { max-height: 500px; padding-left: 1rem; border-left: 2px solid var(--border-color); }
        .accordion-checkbox:checked ~ .accordion-trigger .accordion-chevron { transform: rotate(90deg); color: var(--accent-blue); }

        .sub-link-card { display: flex; align-items: center; justify-content: space-between; padding: 0.75rem 1rem; background: rgba(19, 26, 38, 0.6); border: 1px solid var(--border-color); border-radius: 6px; text-decoration: none; color: var(--text-primary); }
        .link-info { display: flex; flex-direction: column; gap: 0.25rem; }
        .link-title { font-weight: 500; }
        .link-desc { font-size: 0.8rem; color: var(--text-secondary); }

        .accounts-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(115px, 1fr)); gap: 0.6rem; margin: 0.25rem 0; }
        .account-button { display: flex; align-items: center; gap: 0.5rem; padding: 0.65rem 0.75rem; border: 1px solid var(--border-color); border-radius: 6px; color: var(--text-secondary); font-family: 'JetBrains Mono', monospace; font-size: 0.78rem; text-decoration: none; cursor: pointer; }
        .account-button img, .account-button svg { width: 14px; height: 14px; }
        .account-button:hover { color: var(--text-primary); border-color: var(--accent-blue); }
    </style>
</head>
<body>

    <div class="container">
        <header class="profile">
            <div class="avatar-container">
                <img class="avatar" src="https://media.licdn.com/dms/image/v2/D5603AQHg5uhNE51ikg/profile-displayphoto-scale_400_400/B56Z6ZAF7TH0Ag-/0/1780683402540?e=1785974400&v=beta&t=SRF20rJZSCSEN0vIdJeR7lVWNapXg7Ndjjls54jzLPg" alt="Juergen Law Laturisa">
            </div>
            <h1 class="name">Juergen Law Laturisa</h1>
            <div class="tagline">HBSc Forensic Science Student @ UofT Mississauga</div>
            <p class="bio">Prospective Forensic Biology Specialist, Interested in Forensic Botany</p>
        </header>

        <main class="links-container">
            <div class="section-label">Academic & Experience</div>
            
            <div class="accordion-wrapper">
                <input type="checkbox" id="cv-toggle" class="accordion-checkbox">
                <label for="cv-toggle" class="accordion-trigger">
                    <div class="link-info">
                        <span class="link-title">Curriculum Vitae</span>
                        <span class="link-desc">Select a targeted version of my background</span>
                    </div>
                    <span class="accordion-chevron">&gt;</span>
                </label>
                <div class="accordion-content">
                    <a href="https://docs.google.com/document/d/1M8SSm4qlQj0dRdOmJS1pU8YCCj2d5uIZYTOfOZQH7iM/edit?tab=t.y8e6e79xatfx" class="sub-link-card" target="_blank">↳ Master CV</a>
                    <a href="https://docs.google.com/document/d/1M8SSm4qlQj0dRdOmJS1pU8YCCj2d5uIZYTOfOZQH7iM/edit?tab=t.oryv9z5zycmz" class="sub-link-card" target="_blank">↳ Life Science CV</a>
                    <a href="https://docs.google.com/document/d/1M8SSm4qlQj0dRdOmJS1pU8YCCj2d5uIZYTOfOZQH7iM/edit?tab=t.25m2j14tjge1" class="sub-link-card" target="_blank">↳ Programming CV</a>
                </div>
            </div>

            <div class="section-label">Featured Projects</div>
            <div class="accordion-wrapper">
                <input type="checkbox" id="argus-toggle" class="accordion-checkbox">
                <label for="argus-toggle" class="accordion-trigger" style="border-color: rgba(52, 211, 153, 0.3);">
                    <div class="link-info">
                        <span class="link-title" style="color: var(--accent-green);">ARGUS</span>
                        <span class="link-desc">Accounting Report & GUidance System</span>
                    </div>
                    <span class="accordion-chevron">&gt;</span>
                </label>
                <div class="accordion-content">
                    <a href="https://github.com/JuergenLaw/financial-report-system" class="sub-link-card" target="_blank">↳ GitHub Repository</a>
                </div>
            </div>

            <div class="section-label">Directory</div>
            <div class="accounts-grid">
                <a href="https://www.linkedin.com/in/juergen-law" class="account-button" target="_blank">LinkedIn</a>
                <div class="account-button" id="email-btn" onclick="copyEmail()">
                    <span id="email-text">Email</span>
                </div>
            </div>
        </main>
    </div>

    <script>
        document.body.addEventListener('mousemove', (e) => {
            document.body.style.setProperty('--mouse-x', `${e.clientX}px`);
            document.body.style.setProperty('--mouse-y', `${e.clientY}px`);
        });

        function copyEmail() {
            const email = "juergenllaturisa@gmail.com";
            navigator.clipboard.writeText(email).then(() => {
                const btnText = document.getElementById("email-text");
                const originalText = btnText.innerText;
                btnText.innerText = "Copied!";
                setTimeout(() => { btnText.innerText = originalText; }, 2000);
            });
        }
    </script>
</body>
</html>
